<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spunky's Pizza</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #000; color: white; text-align: center; }
        
        .video-container { position: relative; width: 100%; height: 55vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .logo { position: absolute; top: 15px; left: 15px; width: 80px; z-index: 10; }
        
        .badge-bar { background: #d6007d; color: white; font-size: 11px; padding: 8px; font-weight: bold; text-transform: uppercase; width: 100%; }

        .content { padding: 20px; background: black; }
        .destacada { font-size: 12px; color: #aaa; letter-spacing: 2px; margin-bottom: 10px; }
        .title { font-size: 32px; font-weight: 900; margin-bottom: 15px; }

        .price-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .old-price { color: #888; text-decoration: line-through; font-size: 18px; }
        .price { color: #ffcc00; font-size: 55px; font-weight: 900; }

        .sub-text { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        .btn { display: block; background: #2ecc71; color: white; text-decoration: none; padding: 18px; border-radius: 15px; font-size: 20px; font-weight: bold; margin: 0 10px; }
        .delivery-info { font-size: 12px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="video-container">
        <img src="https://res.cloudinary.com/ds2udm1no/image/upload/v1710724000/spunkys_logo.png" class="logo">
        
        <video autoplay muted loop playsinline>
            <source src="20260318_244610450~2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="badge-bar">
        MASA CASERA · SALSA DE TOMATE · MUZZA · HUEVO · MOR...
    </div>

    <div class="content">
        <div class="destacada">DESTACADA DEL MENÚ</div>
        <div class="title">PIZZA CRIOLLA</div>

        <div class="price-row">
            <span class="old-price">$10.000</span>
            <span class="price">$9.500</span>
        </div>

        <p class="sub-text">¡Pedí ahora y lo recibís rápido!</p>

        <a href="https://wa.me/543794112444?text=¡Hola!%20Quiero%20la%20promo%20de%20la%20Pizza%20Criolla" class="btn">
            PEDIR AHORA 🍕
        </a>

        <div class="delivery-info">Entrega rápida ⚡</div>
    </div>

</body>
</html>
