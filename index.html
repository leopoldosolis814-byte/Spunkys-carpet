<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spunky's Pizza</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        /* Aplicando tu solución de 100dvh y overflow hidden */
        body { 
            background-color: #000; 
            color: white; 
            text-align: center; 
            height: 100dvh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        
        .video-container { position: relative; width: 100%; height: 50dvh; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .logo { position: absolute; top: 10px; left: 10px; width: 65px; z-index: 10; }
        
        .badge-bar { background: #d6007d; color: white; font-size: 10px; padding: 8px; font-weight: bold; text-transform: uppercase; width: 100%; letter-spacing: 1px; }

        .content { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; padding: 10px; background: black; }
        .destacada { font-size: 11px; color: #aaa; letter-spacing: 2px; }
        .title { font-size: 28px; font-weight: 900; }

        .price-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .old-price { color: #888; text-decoration: line-through; font-size: 16px; }
        .price { color: #ffcc00; font-size: 48px; font-weight: 900; }

        .btn { 
            display: block; 
            background: #2ecc71; 
            color: white; 
            text-decoration: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 20px; 
            font-weight: bold; 
            margin: 0 15px;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); 
        }
        
        .delivery-info { font-size: 11px; color: #555; }
    </style>
</head>
<body>

    <div class="video-container">
        <img src="https://res.cloudinary.com/ds2udm1no/image/upload/v1710724000/spunkys_logo.png" class="logo">
        <video autoplay muted loop playsinline>
            <source src="20260318_244610450~2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="badge-bar">
        MASA CASERA · SALSA DE TOMATE · MUZZA · HUEVO · MORRÓN
    </div>

    <div class="content">
        <div>
            <div class="destacada">DESTACADA DEL MENÚ</div>
            <div class="title">PIZZA CRIOLLA</div>
        </div>

        <div class="price-row">
            <span class="old-price">$10.000</span>
            <span class="price">$9.500</span>
        </div>

        <a href="https://wa.me/543794112444?text=¡Hola!%20Quiero%20la%20promo%20de%20la%20Pizza%20Criolla" class="btn">
            PEDIR AHORA 🍕
        </a>

        <div class="delivery-info">Entrega rápida en Corrientes ⚡</div>
    </div>

</body>
</html>
